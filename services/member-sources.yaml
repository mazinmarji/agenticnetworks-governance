# Live source of each workspace member's contract, used by
# scripts/verify_live_members.py to check the SHIPPING repos (not the local
# copies) against the canonical SafeDeliveryPolicy.
#
# Keyed by the member `path` in nornyx.workspace.yaml. `repo` is owner/name on
# GitHub; `contract` is the path to that repo's top-level .nyx on its default
# branch. Every member declared in nornyx.workspace.yaml MUST have an entry here
# (the check fails closed on a missing mapping), so adding a member and wiring
# its live verification stay coupled.
members:
  services/govflags.nyx:
    repo: mazinmarji/govflags
    contract: govflags.nyx
  services/notify.nyx:
    repo: mazinmarji/notify
    contract: notify.nyx
  services/mission-control-os.nyx:
    repo: mazinmarji/mission-control-os
    contract: apps/backend/contracts/org-delivery.nyx
    # Private repo (by design): the central check runs unauthenticated and cannot
    # fetch it. Enforcement is by MCO's own CI (org_policy_conformance.py) — the
    # central check verifies the local copy (layer 1) and defers the live check.
    visibility: private
